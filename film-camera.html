<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>胶片相机 · 理光/富士</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:system-ui; overflow:hidden; }
    #viewfinder { position:relative; width:100%; max-width:800px; aspect-ratio:4/3; background:#111; border-radius:12px; overflow:hidden; }
    canvas { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
    video { display:none; }
    .controls { display:flex; justify-content:center; gap:20px; margin:15px 0; flex-wrap:wrap; }
    button { padding:12px 24px; border-radius:30px; border:none; background:rgba(255,255,255,0.15); color:#fff; font-size:16px; backdrop-filter:blur(10px); cursor:pointer; transition:0.2s; }
    button.active { background:#d4a657; color:#000; }
    button.custom-lut-active { background:#8b5cf6; color:#fff; }
    #shutter { width:70px; height:70px; border-radius:50%; background:white; border:5px solid #555; margin:10px; cursor:pointer; }
    #shutter:active { transform:scale(0.95); }
    .bottom-bar { display:flex; align-items:center; gap:20px; }
    #modeLabel { color:#aaa; font-size:14px; min-width:60px; text-align:center; cursor:pointer; }
    .file-input-hidden { display:none; }
  </style>
</head>
<body>
  <div id="viewfinder">
    <canvas id="outputCanvas"></canvas>
    <video id="video" playsinline autoplay muted></video>
  </div>
  <div class="controls">
    <button id="styleFuji" class="active">富士</button>
    <button id="styleRicoh">理光</button>
    <button id="importLutBtn">🎨 导入 LUT</button>
    <button id="switchCamera">🔄 翻转</button>
  </div>
  <div class="bottom-bar">
    <span id="modeLabel">📷 拍照</span>
    <div id="shutter"></div>
    <span style="width:60px;"></span>
  </div>
  <input type="file" accept=".cube,.png,.jpg,.gif" id="lutFileInput" class="file-input-hidden">

  <script>
    // ========================================================
    // 诸葛技能图 · 模块分析
    //
    // 节点：cameraCapture → lutApply → filmicCurve → grain → vignette → output
    // 边：cameraCapture ─依赖─> lutApply ─依赖─> filmicCurve ...
    // 记忆：风格切换记录、自定义 LUT 导入状态
    // ========================================================

    // ========== 全局状态 ==========
    const video = document.getElementById('video');
    const canvas = document.getElementById('outputCanvas');
    const gl = canvas.getContext('webgl2', { premultipliedAlpha: false, preserveDrawingBuffer: true });
    if (!gl) alert('您的浏览器不支持 WebGL2，无法实时处理。');

    let currentStream, facingMode = 'environment';
    let currentLut = null;
    let lutTexFuji, lutTexRicoh;
    let webglProgram, vao, uniforms;
    let isRecording = false, mediaRecorder, recordedChunks = [];
    let captureMode = 'photo';

    // 复用视频纹理对象，避免每帧创建/销毁
    let videoTexture = null;

    // ========================================================
    // 1. createLutTexture — 程序化生成风格 LUT
    // ========================================================
    function createLutTexture(style) {
      const size = 32;
      const data = new Float32Array(size * size * size * 4);
      for (let b = 0; b < size; b++) {
        for (let g = 0; g < size; g++) {
          for (let r = 0; r < size; r++) {
            const idx = (b * size * size + g * size + r) * 4;
            let rf = r / (size - 1);
            let gf = g / (size - 1);
            let bf = b / (size - 1);
            if (style === 'fuji') {
              // 富士：暖色调偏移，高光微黄，阴影偏青
              rf = rf * 0.94 + 0.04;
              gf = gf * 0.90 + 0.06;
              bf = bf * 0.86 + 0.03;
            } else {
              // 理光GR：暗调高对比，轻微褪色，冷绿倾向
              rf = Math.pow(rf, 1.1);
              gf = Math.pow(gf, 1.1);
              bf = Math.pow(bf, 1.1);
              rf += 0.02 * (1 - rf);
              gf += 0.01;
              bf += 0.04 * (1 - bf);
              let gray = 0.2989 * rf + 0.5870 * gf + 0.1140 * bf;
              rf = gray + 1.3 * (rf - gray);
              gf = gray + 1.3 * (gf - gray);
              bf = gray + 1.3 * (bf - gray);
              rf = Math.min(1.0, Math.max(0.0, rf));
              gf = Math.min(1.0, Math.max(0.0, gf));
              bf = Math.min(1.0, Math.max(0.0, bf));
            }
            data[idx] = rf; data[idx + 1] = gf; data[idx + 2] = bf; data[idx + 3] = 1.0;
          }
        }
      }
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_3D, tex);
      gl.texImage3D(gl.TEXTURE_3D, 0, gl.RGBA16F, size, size, size, 0, gl.RGBA, gl.FLOAT, data);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_R, gl.CLAMP_TO_EDGE);
      return tex;
    }

    // ========================================================
    // 2. createLutFromImage — 从平铺图片生成 3D LUT
    // ========================================================
    function createLutFromImage(img) {
      const size = 32;
      const lutCanvas = document.createElement('canvas');
      lutCanvas.width = size * size;
      lutCanvas.height = size;
      const ctx = lutCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0, lutCanvas.width, lutCanvas.height);
      const imageData = ctx.getImageData(0, 0, lutCanvas.width, lutCanvas.height);
      const floatData = new Float32Array(size * size * size * 4);
      for (let b = 0; b < size; b++) {
        for (let g = 0; g < size; g++) {
          for (let r = 0; r < size; r++) {
            const x = r * size + g;
            const y = b;
            const pixelIndex = (y * lutCanvas.width + x) * 4;
            const dstIndex = (b * size * size + g * size + r) * 4;
            floatData[dstIndex]     = imageData.data[pixelIndex] / 255;
            floatData[dstIndex + 1] = imageData.data[pixelIndex + 1] / 255;
            floatData[dstIndex + 2] = imageData.data[pixelIndex + 2] / 255;
            floatData[dstIndex + 3] = 1.0;
          }
        }
      }
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_3D, tex);
      gl.texImage3D(gl.TEXTURE_3D, 0, gl.RGBA16F, size, size, size, 0, gl.RGBA, gl.FLOAT, floatData);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_R, gl.CLAMP_TO_EDGE);
      return tex;
    }

    // ========================================================
    // 3. parseCubeLut — 从 .cube 文本文件解析 LUT
    // ========================================================
    function parseCubeLut(cubeText) {
      const lines = cubeText.split('\n').map(l => l.trim());
      let size = 33;
      let dataPoints = [];
      for (let line of lines) {
        if (line.startsWith('LUT_3D_SIZE')) {
          size = parseInt(line.split(/\s+/)[1]);
        } else if (line.startsWith('#') || line === '') {
          continue;
        } else if (line.startsWith('DOMAIN_MIN') || line.startsWith('DOMAIN_MAX')) {
          continue;
        } else {
          const parts = line.split(/\s+/).filter(x => x !== '');
          if (parts.length >= 3) {
            dataPoints.push(parseFloat(parts[0]), parseFloat(parts[1]), parseFloat(parts[2]));
          }
        }
      }
      const expected = size * size * size * 3;
      if (dataPoints.length !== expected) {
        console.error('LUT 数据量不匹配，预期', expected, '实际', dataPoints.length);
        return null;
      }
      const data = new Float32Array(size * size * size * 4);
      for (let i = 0; i < size * size * size; i++) {
        data[i * 4]     = dataPoints[i * 3];
        data[i * 4 + 1] = dataPoints[i * 3 + 1];
        data[i * 4 + 2] = dataPoints[i * 3 + 2];
        data[i * 4 + 3] = 1.0;
      }
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_3D, tex);
      gl.texImage3D(gl.TEXTURE_3D, 0, gl.RGBA16F, size, size, size, 0, gl.RGBA, gl.FLOAT, data);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_3D, gl.TEXTURE_WRAP_R, gl.CLAMP_TO_EDGE);
      return tex;
    }

    // ========================================================
    // 4. initWebGL — 初始化着色器、VAO、预设 LUT
    // ========================================================
    function initWebGL() {
      const ext = gl.getExtension('EXT_color_buffer_float');
      if (!ext) { alert('需要浮点纹理支持'); return false; }

      const vs = `#version 300 es
        in vec2 a_position;
        out vec2 v_texCoord;
        void main() {
          gl_Position = vec4(a_position, 0.0, 1.0);
          v_texCoord = a_position * 0.5 + 0.5;
        }`;

      const fs = `#version 300 es
        precision highp float;
        uniform sampler2D u_image;
        uniform sampler3D u_lut;
        uniform vec2 u_resolution;
        uniform float u_seed;
        in vec2 v_texCoord;
        out vec4 outColor;

        float random(vec2 co) {
          return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
        }

        float filmicCurve(float x) {
          x = clamp(x, 0.0, 1.0);
          return (x * (1.8 * x + 0.25)) / (x * (1.8 * x + 0.45) + 0.06);
        }

        void main() {
          vec4 color = texture(u_image, v_texCoord);
          vec3 linearRGB = color.rgb;
          linearRGB.r = filmicCurve(linearRGB.r);
          linearRGB.g = filmicCurve(linearRGB.g);
          linearRGB.b = filmicCurve(linearRGB.b);

          vec3 lutCoord = clamp(linearRGB, 0.0, 0.999);
          vec3 lutColor = texture(u_lut, lutCoord).rgb;

          float luma = dot(lutColor, vec3(0.2126, 0.7152, 0.0722));
          float grainAmount = mix(0.018, 0.004, smoothstep(0.0, 0.8, luma));
          float grain = (random(v_texCoord + u_seed) - 0.5) * grainAmount;

          vec3 result = lutColor + grain;

          vec2 uv = v_texCoord - 0.5;
          float vignette = 1.0 - dot(uv, uv) * 0.45;
          result *= vignette;

          result = pow(result, vec3(1.0 / 2.2));
          outColor = vec4(result, 1.0);
        }`;

      const vsShader = gl.createShader(gl.VERTEX_SHADER);
      gl.shaderSource(vsShader, vs); gl.compileShader(vsShader);
      const fsShader = gl.createShader(gl.FRAGMENT_SHADER);
      gl.shaderSource(fsShader, fs); gl.compileShader(fsShader);

      webglProgram = gl.createProgram();
      gl.attachShader(webglProgram, vsShader);
      gl.attachShader(webglProgram, fsShader);
      gl.linkProgram(webglProgram);
      if (!gl.getProgramParameter(webglProgram, gl.LINK_STATUS)) {
        console.error(gl.getProgramInfoLog(webglProgram)); return false;
      }
      gl.useProgram(webglProgram);

      const positions = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
      vao = gl.createVertexArray();
      gl.bindVertexArray(vao);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);
      const posLoc = gl.getAttribLocation(webglProgram, 'a_position');
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

      uniforms = {
        image: gl.getUniformLocation(webglProgram, 'u_image'),
        lut: gl.getUniformLocation(webglProgram, 'u_lut'),
        resolution: gl.getUniformLocation(webglProgram, 'u_resolution'),
        seed: gl.getUniformLocation(webglProgram, 'u_seed')
      };

      lutTexFuji = createLutTexture('fuji');
      lutTexRicoh = createLutTexture('ricoh');
      currentLut = lutTexFuji;

      // 预创建视频纹理
      videoTexture = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, videoTexture);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

      return true;
    }

    // ========================================================
    // 5. renderFrame — 渲染一帧（复用纹理对象）
    // ========================================================
    // 2D Canvas 中转（iOS 兼容：不支持 video → texImage2D）
    const bridgeCanvas = document.createElement('canvas');
    const bridgeCtx = bridgeCanvas.getContext('2d', { willReadFrequently: false });

    function renderFrame() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
        bridgeCanvas.width = w;
        bridgeCanvas.height = h;
        gl.viewport(0, 0, w, h);
      }

      // 第一步：把 video 画到 2D canvas（iOS 兼容）
      bridgeCtx.drawImage(video, 0, 0, w, h);

      // 第二步：把 2D canvas 上传到 WebGL 纹理
      gl.bindTexture(gl.TEXTURE_2D, videoTexture);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, bridgeCanvas);

      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, videoTexture);
      gl.activeTexture(gl.TEXTURE1);
      gl.bindTexture(gl.TEXTURE_3D, currentLut);

      gl.uniform1i(uniforms.image, 0);
      gl.uniform1i(uniforms.lut, 1);
      gl.uniform2f(uniforms.resolution, w, h);
      gl.uniform1f(uniforms.seed, Math.random() * 1000);

      gl.bindVertexArray(vao);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }

    // ========================================================
    // 6. 实时渲染循环
    // ========================================================
    function renderLoop() {
      if (!video.paused && video.readyState >= 2) {
        renderFrame();
      }
      requestAnimationFrame(renderLoop);
    }

    // ========================================================
    // 7. 摄像头管理
    // ========================================================
    async function startCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
      }
      const constraints = {
        video: {
          facingMode: facingMode,
          width: { ideal: 1920 },
          height: { ideal: 1440 },
          frameRate: { ideal: 30 }
        },
        audio: captureMode === 'video'
      };
      try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;
        await video.play();
      } catch (e) {
        console.warn('后置摄像头失败，尝试前置', e);
        try {
          currentStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user' },
            audio: captureMode === 'video'
          });
          video.srcObject = currentStream;
          await video.play();
          facingMode = 'user';
        } catch (e2) {
          console.warn('任何摄像头都不可用', e2);
          // iOS 上首次调用需要用户手势触发
          // 用户点击快门按钮后会自动重试
        }
      }
    }

    // ========================================================
    // 8. 拍照
    // ========================================================
    function takePhoto() {
      const dataURL = canvas.toDataURL('image/jpeg', 0.95);
      const a = document.createElement('a');
      a.href = dataURL;
      a.download = 'film_' + Date.now() + '.jpg';
      a.click();
      if (navigator.share) {
        canvas.toBlob(blob => {
          navigator.share({ files: [new File([blob], 'photo.jpg', {type: 'image/jpeg'})] });
        }, 'image/jpeg');
      }
    }

    // ========================================================
    // 9. 视频录制
    // ========================================================
    function startRecording() {
      if (!canvas.captureStream) { alert('录制不支持'); return; }
      const stream = canvas.captureStream(30);
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
      recordedChunks = [];
      mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'film_video_' + Date.now() + '.webm';
        a.click();
      };
      mediaRecorder.start();
      isRecording = true;
      document.getElementById('modeLabel').textContent = '⏺ 录制中';
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('modeLabel').textContent = '📷 拍照';
      }
    }

    function toggleMode() {
      if (isRecording) { stopRecording(); return; }
      if (captureMode === 'photo') {
        captureMode = 'video';
        document.getElementById('modeLabel').textContent = '🎥 视频';
      } else {
        captureMode = 'photo';
        document.getElementById('modeLabel').textContent = '📷 拍照';
      }
      startCamera();
    }

    // ========================================================
    // 10. 风格选择与 LUT 导入
    // ========================================================
    function setStyle(style) {
      document.getElementById('styleFuji').classList.remove('active');
      document.getElementById('styleRicoh').classList.remove('active');
      document.getElementById('importLutBtn').classList.remove('active');

      if (style === 'fuji') {
        currentLut = lutTexFuji;
        document.getElementById('styleFuji').classList.add('active');
      } else if (style === 'ricoh') {
        currentLut = lutTexRicoh;
        document.getElementById('styleRicoh').classList.add('active');
      }
    }

    function applyCustomLut(tex) {
      currentLut = tex;
      document.getElementById('styleFuji').classList.remove('active');
      document.getElementById('styleRicoh').classList.remove('active');
      document.getElementById('importLutBtn').classList.add('active');
    }

    async function handleLutFile(file) {
      try {
        let tex;
        const ext = file.name.split('.').pop().toLowerCase();

        if (ext === 'cube') {
          const text = await file.text();
          tex = parseCubeLut(text);
          if (!tex) {
            alert('LUT 解析失败：数据格式不匹配');
            return;
          }
        } else if (ext === 'png') {
          const img = await loadImage(file);
          tex = createLutFromImage(img);
        } else {
          alert('不支持的文件格式，请选择 .cube 或 .png');
          return;
        }

        applyCustomLut(tex);
        console.log('✅ 自定义 LUT 已加载:', file.name);
      } catch (err) {
        console.error('LUT 加载失败:', err);
        alert('LUT 加载失败：' + err.message);
      }
    }

    function loadImage(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('图片加载失败')); };
        img.src = url;
      });
    }

    // ========================================================
    // 11. 事件绑定
    // ========================================================
    document.getElementById('shutter').addEventListener('click', async () => {
      // iOS 上摄像头必须由用户手势触发
      if (!cameraStarted) {
        await startCameraWithGesture();
        if (!currentStream) {
          alert('无法访问摄像头，请在设置中允许相机权限');
          return;
        }
      }
      if (captureMode === 'photo') takePhoto();
      else toggleMode();
    });
    document.getElementById('modeLabel').addEventListener('click', toggleMode);
    document.getElementById('switchCamera').addEventListener('click', async () => {
      if (!cameraStarted) await startCameraWithGesture();
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      startCamera();
    });

    // 风格按钮（点击时同时触发摄像头启动）
    document.getElementById('styleFuji').addEventListener('click', async () => {
      if (!cameraStarted) await startCameraWithGesture();
      setStyle('fuji');
    });
    document.getElementById('styleRicoh').addEventListener('click', async () => {
      if (!cameraStarted) await startCameraWithGesture();
      setStyle('ricoh');
    });

    // LUT 导入
    document.getElementById('importLutBtn').addEventListener('click', () => {
      document.getElementById('lutFileInput').click();
    });
    document.getElementById('lutFileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      await handleLutFile(file);
      e.target.value = ''; // 重置，允许重复选择同一文件
    });

    // ========================================================
    // 12. 启动
    // ========================================================
    let cameraStarted = false;

    async function startCameraWithGesture() {
      if (cameraStarted) return;
      cameraStarted = true;
      await startCamera();
    }

    (async () => {
      if (!initWebGL()) return;
      // iOS 上 getUserMedia 必须由用户手势触发
      // 先启动渲染循环（没有视频帧时会静默等待）
      renderLoop();

      // 尝试启动摄像头（可能在无手势时失败，静默处理）
      try {
        await startCamera();
        cameraStarted = true;
      } catch (e) {
        // iOS 上首次调用会静默失败，等待用户点击启动
        console.log('等待用户手势启动摄像头...');
      }
    })();
  </script>
</body>
</html>
