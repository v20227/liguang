<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>胶片相机 · 理光/富士</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:system-ui; overflow:hidden; }
    #viewfinder { position:relative; width:100%; max-width:800px; aspect-ratio:4/3; background:#111; border-radius:12px; overflow:hidden; }
    canvas { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
    video { display:none; }
    .controls { display:flex; justify-content:center; gap:20px; margin:15px 0; flex-wrap:wrap; }
    button { padding:12px 24px; border-radius:30px; border:none; background:rgba(255,255,255,0.15); color:#fff; font-size:16px; backdrop-filter:blur(10px); cursor:pointer; transition:0.2s; }
    button.active { background:#d4a657; color:#000; }
    #shutter { width:70px; height:70px; border-radius:50%; background:white; border:5px solid #555; margin:10px; cursor:pointer; }
    #shutter:active { transform:scale(0.95); }
    .bottom-bar { display:flex; align-items:center; gap:20px; }
    #modeLabel { color:#aaa; font-size:14px; min-width:60px; text-align:center; cursor:pointer; }
    #debug { position:fixed; bottom:10px; left:10px; right:10px; color:#0f0; font-size:12px; font-family:monospace; background:rgba(0,0,0,0.7); padding:8px; border-radius:6px; max-height:80px; overflow-y:auto; z-index:99; }
    .file-input-hidden { display:none; }
  </style>
</head>
<body>
  <div id="viewfinder">
    <canvas id="outputCanvas"></canvas>
    <video id="video" playsinline autoplay muted></video>
  </div>
  <div class="controls">
    <button id="styleFuji" class="active">富士</button>
    <button id="styleRicoh">理光</button>
    <button id="switchCamera">🔄 翻转</button>
  </div>
  <div class="bottom-bar">
    <span id="modeLabel">📷 拍照</span>
    <div id="shutter"></div>
    <span style="width:60px;"></span>
  </div>
  <div id="debug">🔍 诊断信息将显示在这里...</div>

  <script>
    // ========================================================
    // 胶片相机 v2 · 完全兼容 iOS
    // 不使用 3D 纹理（TEXTURE_3D），改用着色器内数学模拟
    // ========================================================

    const video = document.getElementById('video');
    const canvas = document.getElementById('outputCanvas');
    const debug = document.getElementById('debug');

    function log(msg) {
      debug.textContent = '🔍 ' + msg;
      console.log(msg);
    }

    // 尝试 WebGL2，降级到 WebGL1
    let gl = canvas.getContext('webgl2', { premultipliedAlpha: false, preserveDrawingBuffer: true });
    let isWebGL2 = true;
    if (!gl) {
      gl = canvas.getContext('webgl', { premultipliedAlpha: false, preserveDrawingBuffer: true });
      isWebGL2 = false;
      log('WebGL2 不可用，降级到 WebGL1');
    }
    if (!gl) {
      log('❌ 浏览器不支持 WebGL');
      throw new Error('No WebGL');
    }
    log('✅ WebGL ' + (isWebGL2 ? '2' : '1') + ' 初始化成功');

    let currentStream, facingMode = 'environment';
    let currentStyle = 'fuji';
    let webglProgram, vao, uniforms;
    let cameraStarted = false;
    let isRecording = false, mediaRecorder, recordedChunks = [];
    let captureMode = 'photo';

    // 2D Canvas 中转（iOS video→texImage2D 兼容）
    const bridgeCanvas = document.createElement('canvas');
    const bridgeCtx = bridgeCanvas.getContext('2d', { willReadFrequently: false });
    let videoTexture = null;

    // ========================================================
    // 着色器：用数学公式模拟胶片风格（不依赖 3D 纹理）
    // ========================================================
    function getShaderSource() {
      const version = isWebGL2 ? '#version 300 es\nprecision highp float;\n' : 'precision highp float;\n';
      const inTex = isWebGL2 ? 'in vec2 v_texCoord;\nout vec4 outColor;\n' : 'varying vec2 v_texCoord;\n';
      const texFunc = isWebGL2 ? 'texture' : 'texture2D';
      const setFrag = isWebGL2 ? 'outColor = vec4(result, 1.0);' : 'gl_FragColor = vec4(result, 1.0);';

      const src = `
        uniform sampler2D u_image;
        uniform vec2 u_resolution;
        uniform float u_seed;
        uniform float u_style; // 0=fuji, 1=ricoh
        ${inTex}
        ${texFunc.startsWith('tex') ? '' : ''}

        float random(vec2 co) {
          return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
        }

        float filmicCurve(float x) {
          x = clamp(x, 0.0, 1.0);
          return (x * (1.8 * x + 0.25)) / (x * (1.8 * x + 0.45) + 0.06);
        }

        vec3 fujiStyle(vec3 rgb) {
          // 富士：暖色调，高光微黄，阴影偏青
          vec3 c = rgb;
          c.r = c.r * 0.94 + 0.04;
          c.g = c.g * 0.90 + 0.06;
          c.b = c.b * 0.86 + 0.03;
          return c;
        }

        vec3 ricohStyle(vec3 rgb) {
          // 理光GR：暗调高对比，轻微褪色，冷绿倾向
          vec3 c = rgb;
          c.r = pow(c.r, 1.1);
          c.g = pow(c.g, 1.1);
          c.b = pow(c.b, 1.1);
          c.r += 0.02 * (1.0 - c.r);
          c.g += 0.01;
          c.b += 0.04 * (1.0 - c.b);
          float gray = 0.2989 * c.r + 0.5870 * c.g + 0.1140 * c.b;
          c.r = gray + 1.3 * (c.r - gray);
          c.g = gray + 1.3 * (c.g - gray);
          c.b = gray + 1.3 * (c.b - gray);
          return clamp(c, 0.0, 1.0);
        }

        void main() {
          vec2 uv = v_texCoord;
          uv.y = 1.0 - uv.y; // 翻转 Y
          vec4 color = ${texFunc}(u_image, uv);

          vec3 rgb = color.rgb;
          rgb.r = filmicCurve(rgb.r);
          rgb.g = filmicCurve(rgb.g);
          rgb.b = filmicCurve(rgb.b);

          vec3 styled;
          if (u_style < 0.5) {
            styled = fujiStyle(rgb);
          } else {
            styled = ricohStyle(rgb);
          }

          float luma = dot(styled, vec3(0.2126, 0.7152, 0.0722));
          float grainAmt = mix(0.018, 0.004, smoothstep(0.0, 0.8, luma));
          float grain = (random(v_texCoord + u_seed) - 0.5) * grainAmt;
          vec3 result = styled + grain;

          vec2 vigUv = v_texCoord - 0.5;
          float vignette = 1.0 - dot(vigUv, vigUv) * 0.45;
          result *= vignette;

          result = pow(result, vec3(1.0 / 2.2));
          ${setFrag}
        }
      `;
      return src;
    }

    // ========================================================
    // WebGL 初始化
    // ========================================================
    function initWebGL() {
      const vsSource = isWebGL2
        ? `#version 300 es
           in vec2 a_position;
           out vec2 v_texCoord;
           void main() {
             gl_Position = vec4(a_position, 0.0, 1.0);
             v_texCoord = a_position * 0.5 + 0.5;
           }`
        : `attribute vec2 a_position;
           varying vec2 v_texCoord;
           void main() {
             gl_Position = vec4(a_position, 0.0, 1.0);
             v_texCoord = a_position * 0.5 + 0.5;
           }`;

      const fsSource = getShaderSource();

      const vs = gl.createShader(gl.VERTEX_SHADER);
      gl.shaderSource(vs, vsSource); gl.compileShader(vs);
      if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) {
        log('❌ 顶点着色器编译失败: ' + gl.getShaderInfoLog(vs));
        return false;
      }

      const fs = gl.createShader(gl.FRAGMENT_SHADER);
      gl.shaderSource(fs, fsSource); gl.compileShader(fs);
      if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
        log('❌ 片段着色器编译失败: ' + gl.getShaderInfoLog(fs));
        return false;
      }

      webglProgram = gl.createProgram();
      gl.attachShader(webglProgram, vs);
      gl.attachShader(webglProgram, fs);
      gl.linkProgram(webglProgram);
      if (!gl.getProgramParameter(webglProgram, gl.LINK_STATUS)) {
        log('❌ 着色器链接失败: ' + gl.getProgramInfoLog(webglProgram));
        return false;
      }
      gl.useProgram(webglProgram);

      const positions = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);

      if (isWebGL2) {
        vao = gl.createVertexArray();
        gl.bindVertexArray(vao);
      }

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

      const posLoc = gl.getAttribLocation(webglProgram, 'a_position');
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

      uniforms = {
        image: gl.getUniformLocation(webglProgram, 'u_image'),
        resolution: gl.getUniformLocation(webglProgram, 'u_resolution'),
        seed: gl.getUniformLocation(webglProgram, 'u_seed'),
        style: gl.getUniformLocation(webglProgram, 'u_style'),
      };

      // 创建视频纹理
      videoTexture = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, videoTexture);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

      log('✅ WebGL 着色器就绪');
      return true;
    }

    // ========================================================
    // 渲染一帧
    // ========================================================
    function renderFrame() {
      const w = video.videoWidth || bridgeCanvas.width || 640;
      const h = video.videoHeight || bridgeCanvas.height || 480;
      if (bridgeCanvas.width !== w || bridgeCanvas.height !== h) {
        bridgeCanvas.width = w;
        bridgeCanvas.height = h;
        gl.viewport(0, 0, w, h);
      }

      // iOS 兼容：video → 2D canvas → WebGL 纹理
      try {
        bridgeCtx.drawImage(video, 0, 0, w, h);
      } catch(e) {
        // 视频还没就绪，跳过这帧
        return;
      }

      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, videoTexture);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, bridgeCanvas);

      gl.uniform1i(uniforms.image, 0);
      gl.uniform2f(uniforms.resolution, w, h);
      gl.uniform1f(uniforms.seed, Math.random() * 1000);
      gl.uniform1f(uniforms.style, currentStyle === 'fuji' ? 0.0 : 1.0);

      if (isWebGL2) {
        gl.bindVertexArray(vao);
      }
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }

    // ========================================================
    // 渲染循环
    // ========================================================
    function renderLoop() {
      if (video.readyState >= 2 && !video.paused) {
        renderFrame();
      }
      requestAnimationFrame(renderLoop);
    }

    // ========================================================
    // 摄像头
    // ========================================================
    async function startCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
      }

      // iOS 需要先检查是否有权限
      try {
        const perm = await navigator.permissions.query({ name: 'camera' });
        log('相机权限: ' + perm.state);
      } catch(e) {
        // iOS 不支持 permissions API
      }

      const tryFacing = async (mode) => {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: mode, width: { ideal: 1280 }, height: { ideal: 960 } },
          audio: captureMode === 'video'
        });
        return stream;
      };

      try {
        currentStream = await tryFacing(facingMode);
      } catch (e) {
        log('后置失败，尝试前置');
        try {
          currentStream = await tryFacing('user');
          facingMode = 'user';
        } catch (e2) {
          log('❌ 所有摄像头不可用');
          throw e2;
        }
      }

      video.srcObject = currentStream;
      await video.play();

      // 更新 canvas 尺寸
      const w = video.videoWidth || 1280;
      const h = video.videoHeight || 960;
      canvas.width = w;
      canvas.height = h;
      bridgeCanvas.width = w;
      bridgeCanvas.height = h;
      gl.viewport(0, 0, w, h);

      log('✅ 摄像头已启动 (' + w + 'x' + h + ')');
    }

    // ========================================================
    // 拍照
    // ========================================================
    function takePhoto() {
      const dataURL = canvas.toDataURL('image/jpeg', 0.95);
      const a = document.createElement('a');
      a.href = dataURL;
      a.download = 'film_' + Date.now() + '.jpg';
      a.click();
      if (navigator.share) {
        canvas.toBlob(blob => {
          navigator.share({ files: [new File([blob], 'photo.jpg', {type: 'image/jpeg'})] });
        }, 'image/jpeg');
      }
      log('📸 已拍照');
    }

    // ========================================================
    // 视频录制
    // ========================================================
    function startRecording() {
      if (!canvas.captureStream) { alert('录制不支持'); return; }
      const stream = canvas.captureStream(30);
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
      recordedChunks = [];
      mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'film_video_' + Date.now() + '.webm';
        a.click();
      };
      mediaRecorder.start();
      isRecording = true;
      document.getElementById('modeLabel').textContent = '⏺ 录制中';
    }

    function stopRecording() {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById('modeLabel').textContent = '📷 拍照';
      }
    }

    function toggleMode() {
      if (isRecording) { stopRecording(); return; }
      if (captureMode === 'photo') {
        captureMode = 'video';
        document.getElementById('modeLabel').textContent = '🎥 视频';
      } else {
        captureMode = 'photo';
        document.getElementById('modeLabel').textContent = '📷 拍照';
      }
      startCamera();
    }

    // ========================================================
    // 事件绑定
    // ========================================================
    async function ensureCamera() {
      if (cameraStarted) return;
      cameraStarted = true;
      try {
        await startCamera();
      } catch (e) {
        alert('无法访问摄像头，请在设置中允许相机权限');
      }
    }

    document.getElementById('shutter').addEventListener('click', async () => {
      if (!cameraStarted) { await ensureCamera(); if (!currentStream) return; }
      if (captureMode === 'photo') takePhoto();
      else toggleMode();
    });

    document.getElementById('modeLabel').addEventListener('click', toggleMode);

    document.getElementById('switchCamera').addEventListener('click', async () => {
      if (!cameraStarted) { await ensureCamera(); if (!currentStream) return; }
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      startCamera();
    });

    document.getElementById('styleFuji').addEventListener('click', async () => {
      if (!cameraStarted) await ensureCamera();
      currentStyle = 'fuji';
      document.getElementById('styleFuji').classList.add('active');
      document.getElementById('styleRicoh').classList.remove('active');
      log('🎨 富士风格');
    });

    document.getElementById('styleRicoh').addEventListener('click', async () => {
      if (!cameraStarted) await ensureCamera();
      currentStyle = 'ricoh';
      document.getElementById('styleRicoh').classList.add('active');
      document.getElementById('styleFuji').classList.remove('active');
      log('🎨 理光风格');
    });

    // ========================================================
    // 启动
    // ========================================================
    (async () => {
      if (!initWebGL()) return;
      renderLoop();
      log('📱 点击任意按钮启动相机');
    })();
  </script>
</body>
</html>
