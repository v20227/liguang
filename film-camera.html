<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>胶片相机 · iOS 诊断</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; color:#fff; font-family:system-ui; padding:20px; }
    #log { background:rgba(0,0,0,0.8); border:1px solid #333; border-radius:8px; padding:12px; font-size:12px; font-family:monospace; max-height:300px; overflow-y:auto; margin-bottom:15px; }
    #log div { padding:2px 0; }
    #preview { width:100%; max-width:400px; background:#111; border-radius:8px; overflow:hidden; margin:10px 0; }
    video { width:100%; display:block; }
    canvas { width:100%; display:block; background:#222; }
    button { padding:10px 20px; border-radius:20px; border:none; background:#d4a657; color:#000; font-size:14px; margin:5px; cursor:pointer; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:8px 0; }
    .box { background:#111; border-radius:8px; padding:10px; margin:5px 0; }
    .green { color:#0f0; }
    .red { color:#f00; }
    .yellow { color:#ff0; }
  </style>
</head>
<body>
  <h2>🎞 胶片相机 · 诊断</h2>
  <div class="row">
    <button id="btnCamera">📷 启动摄像头</button>
    <button id="btnTest">🧪 测试WebGL渲染</button>
  </div>
  <div id="log">等待操作...</div>

  <div class="box">
    <div>视频预览 (video 元素)</div>
    <div id="preview"><video id="video" playsinline autoplay muted style="display:none;"></video></div>
  </div>

  <div class="box">
    <div>WebGL 输出 (canvas)</div>
    <canvas id="output"></canvas>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('output');
    const logDiv = document.getElementById('log');
    let stream = null;

    function log(msg, cls = '') {
      const d = document.createElement('div');
      if (cls) d.className = cls;
      d.textContent = '> ' + msg;
      logDiv.appendChild(d);
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(msg);
    }

    // =========================================
    // 第一步：测试摄像头
    // =========================================
    document.getElementById('btnCamera').addEventListener('click', async () => {
      log('请求摄像头权限...');
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } },
          audio: false
        });
        log('✅ getUserMedia 成功', 'green');
        log('   track 数量: ' + stream.getTracks().length);
        log('   视频 track: ' + (stream.getVideoTracks()[0]?.label || '无'));

        video.style.display = 'block';
        video.srcObject = stream;
        await video.play();
        log('✅ video.play() 完成', 'green');

        // 等待视频元数据加载
        await new Promise(resolve => {
          if (video.videoWidth > 0) resolve();
          else video.addEventListener('loadedmetadata', resolve, {once: true});
        });
        log('   视频尺寸: ' + video.videoWidth + 'x' + video.videoHeight);
        log('   readyState: ' + video.readyState);
      } catch(e) {
        log('❌ 摄像头失败: ' + e.message, 'red');
        log('   name: ' + e.name);
        log('   code: ' + (e.code || '无'));
      }
    });

    // =========================================
    // 第二步：测试 WebGL 渲染（从 canvas）
    // =========================================
    document.getElementById('btnTest').addEventListener('click', () => {
      canvas.width = 640;
      canvas.height = 480;

      // 尝试 WebGL2
      let gl = canvas.getContext('webgl2', { premultipliedAlpha: false });
      let isGL2 = true;
      if (!gl) {
        gl = canvas.getContext('webgl', { premultipliedAlpha: false });
        isGL2 = false;
      }
      if (!gl) {
        log('❌ WebGL 不可用', 'red');
        return;
      }
      log('✅ WebGL' + (isGL2 ? '2' : '1') + ' 已创建', 'green');

      // 测试清屏
      gl.clearColor(0.2, 0.2, 0.2, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      log('✅ 清屏正常', 'green');

      // 测试着色器
      const vs = isGL2
        ? '#version 300 es\nin vec2 a_pos; out vec2 v_uv; void main(){ gl_Position=vec4(a_pos,0,1); v_uv=a_pos*0.5+0.5; }'
        : 'attribute vec2 a_pos; varying vec2 v_uv; void main(){ gl_Position=vec4(a_pos,0,1); v_uv=a_pos*0.5+0.5; }';

      const fs = isGL2
        ? '#version 300 es\nprecision highp float; in vec2 v_uv; out vec4 c; void main(){ c=vec4(v_uv,0.5,1); }'
        : 'precision highp float; varying vec2 v_uv; void main(){ gl_FragColor=vec4(v_uv,0.5,1); }';

      const vsObj = gl.createShader(gl.VERTEX_SHADER);
      gl.shaderSource(vsObj, vs); gl.compileShader(vsObj);
      if (!gl.getShaderParameter(vsObj, gl.COMPILE_STATUS)) {
        log('❌ VS 编译失败: ' + gl.getShaderInfoLog(vsObj), 'red');
        return;
      }

      const fsObj = gl.createShader(gl.FRAGMENT_SHADER);
      gl.shaderSource(fsObj, fs); gl.compileShader(fsObj);
      if (!gl.getShaderParameter(fsObj, gl.COMPILE_STATUS)) {
        log('❌ FS 编译失败: ' + gl.getShaderInfoLog(fsObj), 'red');
        return;
      }

      const prog = gl.createProgram();
      gl.attachShader(prog, vsObj);
      gl.attachShader(prog, fsObj);
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        log('❌ 链接失败: ' + gl.getProgramInfoLog(prog), 'red');
        return;
      }
      log('✅ 着色器编译链接正常', 'green');

      // 绘制渐变矩形
      gl.useProgram(prog);
      const pos = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, pos, gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(prog, 'a_pos');
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      log('✅ 着色器绘制完成（应看到渐变背景）', 'green');

      // 如果摄像头已启动，测试 video → canvas → WebGL
      if (stream && video.videoWidth > 0) {
        log('测试 video → canvas → WebGL 纹理...', 'yellow');
        try {
          const bridge = document.createElement('canvas');
          bridge.width = video.videoWidth;
          bridge.height = video.videoHeight;
          const ctx = bridge.getContext('2d');
          ctx.drawImage(video, 0, 0);

          gl.activeTexture(gl.TEXTURE0);
          const tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, bridge);
          log('✅ texImage2D(canvas) 成功', 'green');

          // 用 video 直传（iOS 可能不支持）
          try {
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);
            log('✅ texImage2D(video) 成功', 'green');
          } catch(e) {
            log('⚠️ texImage2D(video) 失败: ' + e.message + '（预期内）', 'yellow');
          }
        } catch(e) {
          log('❌ 纹理测试失败: ' + e.message, 'red');
        }
      }
    });
  </script>
</body>
</html>
